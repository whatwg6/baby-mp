name: CI

on:
  pull_request:
  push:
    branches:
      - main
  # Keep release and operations checks available without running them on
  # every change during the local-development phase.
  workflow_dispatch:

permissions:
  contents: read

env:
  PNPM_VERSION: 10.33.4
  PLAYWRIGHT_VERSION: 1.54.1

jobs:
  verify:
    # Fresh-install workspace verification is temporarily manual. The H5 E2E
    # job remains automatic and covers the local application startup path.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        env:
          APP_ENV: test
          APP_VERSION: 0.1.0
          API_HOST: 127.0.0.1
          API_PORT: 3300
          CORS_ORIGINS: http://127.0.0.1:10086
          DATABASE_URL: postgresql://baby_mp:baby_mp@127.0.0.1:5432/baby_mp_test?schema=public
          JWT_ACCESS_SECRET: ci-only-access-secret-not-for-production
          JWT_REFRESH_SECRET: ci-only-refresh-secret-not-for-production
          MOCK_AUTH_ENABLED: 'false'
          S3_ENDPOINT: http://127.0.0.1:9000
          S3_REGION: local
          S3_BUCKET: baby-mp-test
          S3_ACCESS_KEY: ci-only-key
          S3_SECRET_KEY: ci-only-secret
          S3_FORCE_PATH_STYLE: 'true'
          TARO_APP_API_BASE_URL: https://api.example.invalid
        run: pnpm verify

      - name: Verify release artifact budgets and security boundaries
        if: github.event_name == 'workflow_dispatch'
        env:
          CI: 'true'
          ALLOW_TEST_RELEASE_API_ORIGIN: 'true'
          EXPECTED_RELEASE_API_ORIGIN: https://api.example.invalid
        run: pnpm verify:artifacts

      - name: Verify runtime configuration preflight
        if: github.event_name == 'workflow_dispatch'
        run: scripts/verify-runtime-preflight.sh

      - name: Require complete P0/P1 automation traceability
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/verify-test-traceability.mjs --require-covered

      - name: Detect OpenAPI drift
        if: github.event_name == 'workflow_dispatch'
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://baby_mp:baby_mp@127.0.0.1:5432/baby_mp_test?schema=public
          JWT_ACCESS_SECRET: ci-only-access-secret-not-for-production
          JWT_REFRESH_SECRET: ci-only-refresh-secret-not-for-production
          S3_ENDPOINT: http://127.0.0.1:9000
          S3_ACCESS_KEY: ci-only-key
          S3_SECRET_KEY: ci-only-secret
        run: |
          pnpm openapi:generate
          git diff --exit-code -- apps/api/openapi/openapi.json

      - name: Generate and verify production-mode client evidence manifest
        if: github.event_name == 'workflow_dispatch'
        env:
          CI: 'true'
          ALLOW_TEST_RELEASE_API_ORIGIN: 'true'
          EXPECTED_RELEASE_API_ORIGIN: https://api.example.invalid
          RELEASE_COMMIT_SHA: ${{ github.sha }}
          RELEASE_VERSION: 0.1.0-ci.${{ github.run_number }}.${{ github.run_attempt }}
        run: |
          test "$RELEASE_COMMIT_SHA" = "$(git rev-parse HEAD)"
          pnpm release:manifest
          pnpm release:manifest:verify

      - name: Upload verified production-mode client evidence
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: baby-mp-client-production-mode-evidence-${{ github.sha }}
          path: |
            apps/client/dist/h5/
            apps/client/dist/weapp/
            apps/client/dist/release-manifest.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 9

  integration:
    # The full API/worker and backup/restore rehearsal is retained for manual
    # release-readiness runs. Automatic CI focuses on local app verification.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16.9-alpine
        env:
          POSTGRES_DB: baby_mp_test
          POSTGRES_USER: baby_mp
          POSTGRES_PASSWORD: baby-mp-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U baby_mp -d baby_mp_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      APP_VERSION: 0.1.0
      API_HOST: 127.0.0.1
      API_PORT: 3300
      CORS_ORIGINS: http://127.0.0.1:10086
      DATABASE_URL: postgresql://baby_mp:baby-mp-ci-password@127.0.0.1:5432/baby_mp_test?schema=public
      JWT_ACCESS_SECRET: ci-integration-access-secret
      JWT_REFRESH_SECRET: ci-integration-refresh-secret
      MOCK_AUTH_ENABLED: 'true'
      RATE_LIMIT_LOGIN_MAX: 100
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_REGION: us-east-1
      S3_BUCKET: baby-mp-ci
      S3_ACCESS_KEY: baby-mp-ci
      S3_SECRET_KEY: baby-mp-ci-secret
      S3_FORCE_PATH_STYLE: 'true'
      M3_STORAGE_URL: http://127.0.0.1:9000
      M3_STORAGE_BUCKET: baby-mp-ci
      M5_API_BASE_URL: http://127.0.0.1:3300/api/v1
      M6_STORAGE_URL: http://127.0.0.1:9000
      TARO_APP_API_BASE_URL: http://127.0.0.1:3300
      H5_BASE_URL: http://127.0.0.1:10086
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start MinIO service
        run: |
          docker run --detach --rm --name baby-mp-ci-minio \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER="${S3_ACCESS_KEY}" \
            --env MINIO_ROOT_PASSWORD="${S3_SECRET_KEY}" \
            --health-cmd "curl --fail http://127.0.0.1:9000/minio/health/live" \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 20 \
            minio/minio:RELEASE.2025-04-22T22-12-26Z server /data
          for attempt in $(seq 1 30); do
            status="$(docker inspect --format '{{.State.Health.Status}}' baby-mp-ci-minio)"
            if [ "$status" = healthy ]; then exit 0; fi
            if [ "$status" = unhealthy ]; then
              docker logs baby-mp-ci-minio
              exit 1
            fi
            sleep 2
          done
          echo 'MinIO did not become healthy in time' >&2
          exit 1

      - name: Generate Prisma client and deploy empty database
        run: |
          pnpm db:generate
          pnpm db:deploy

      - name: Create private object-storage bucket
        run: scripts/prepare-ci-s3.sh

      - name: Verify private object storage and signed URL expiry
        env:
          AWS_ACCESS_KEY_ID: baby-mp-ci
          AWS_SECRET_ACCESS_KEY: baby-mp-ci-secret
          S3_PRIVATE_PROBE_KEY: operations/private-probe.txt
        run: scripts/verify-s3-operations.sh

      - name: Build API
        run: |
          pnpm contracts:build
          pnpm --filter @baby-mp/api build

      - name: Run real API and worker smoke tests
        env:
          M5_PSQL_CONTAINER: ${{ job.services.postgres.id }}
          M5_POSTGRES_USER: baby_mp
          M5_POSTGRES_DB: baby_mp_test
          M6_PSQL_CONTAINER: ${{ job.services.postgres.id }}
          M6_POSTGRES_USER: baby_mp
          M6_POSTGRES_DB: baby_mp_test
          M7_PSQL_CONTAINER: ${{ job.services.postgres.id }}
          M7_POSTGRES_USER: baby_mp
          M7_POSTGRES_DB: baby_mp_test
        run: scripts/verify-ci-integration.sh

      - name: Install PostgreSQL client for restore rehearsal
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes postgresql-client
          fi

      - name: Rehearse backup, restore, forward migration, and API readiness
        env:
          PGHOST: 127.0.0.1
          PGPORT: '5432'
          PGDATABASE: baby_mp_test
          PGUSER: baby_mp
          PGPASSWORD: baby-mp-ci-password
          REHEARSAL_CONFIRM: CREATE_AND_DROP_DISPOSABLE_DATABASE
          REHEARSAL_SOURCE_QUIESCED: 'YES'
          RESTORE_SMOKE_API_PORT: '3499'
        run: scripts/verify-postgres-backup-restore.sh

      - name: Stop MinIO service
        if: always()
        run: docker stop baby-mp-ci-minio >/dev/null 2>&1 || true

  h5-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16.9-alpine
        env:
          POSTGRES_DB: baby_mp_e2e
          POSTGRES_USER: baby_mp
          POSTGRES_PASSWORD: baby-mp-e2e-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U baby_mp -d baby_mp_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      APP_VERSION: 0.1.0
      API_HOST: 127.0.0.1
      API_PORT: 3300
      CORS_ORIGINS: http://127.0.0.1:10086
      DATABASE_URL: postgresql://baby_mp:baby-mp-e2e-password@127.0.0.1:5432/baby_mp_e2e?schema=public
      JWT_ACCESS_SECRET: ci-e2e-access-secret
      JWT_REFRESH_SECRET: ci-e2e-refresh-secret
      MOCK_AUTH_ENABLED: 'true'
      # The nine serial journeys create distinct users and intentionally log
      # in through both API fixtures and the browser. Keep production defaults
      # strict while preventing the shared CI source IP from coupling tests.
      RATE_LIMIT_LOGIN_MAX: 100
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_REGION: us-east-1
      S3_BUCKET: baby-mp-e2e
      S3_ACCESS_KEY: baby-mp-e2e
      S3_SECRET_KEY: baby-mp-e2e-secret
      S3_FORCE_PATH_STYLE: 'true'
      TARO_APP_API_BASE_URL: http://127.0.0.1:3300
      H5_BASE_URL: http://127.0.0.1:10086
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start private MinIO service
        run: |
          docker run --detach --rm --name baby-mp-e2e-minio \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER="${S3_ACCESS_KEY}" \
            --env MINIO_ROOT_PASSWORD="${S3_SECRET_KEY}" \
            --health-cmd "curl --fail http://127.0.0.1:9000/minio/health/live" \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 20 \
            minio/minio:RELEASE.2025-04-22T22-12-26Z server /data
          for attempt in $(seq 1 30); do
            status="$(docker inspect --format '{{.State.Health.Status}}' baby-mp-e2e-minio)"
            if [ "$status" = healthy ]; then exit 0; fi
            if [ "$status" = unhealthy ]; then
              docker logs baby-mp-e2e-minio
              exit 1
            fi
            sleep 2
          done
          echo 'MinIO did not become healthy in time' >&2
          exit 1

      - name: Deploy fresh E2E database
        run: |
          pnpm db:generate
          pnpm db:deploy

      - name: Create private E2E object-storage bucket
        run: scripts/prepare-ci-s3.sh

      - name: Build API and test-enabled H5 application
        run: |
          pnpm contracts:build
          pnpm --filter @baby-mp/api build
          pnpm --filter @baby-mp/client build:h5:e2e

      - name: Install isolated Playwright runtime
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright
        run: |
          npm install --prefix "${RUNNER_TEMP}/baby-mp-playwright" --no-save --package-lock=false "@playwright/test@${PLAYWRIGHT_VERSION}"
          "${RUNNER_TEMP}/baby-mp-playwright/node_modules/.bin/playwright" install --with-deps chromium

      - name: Run H5 core Playwright journey
        env:
          NODE_PATH: ${{ runner.temp }}/baby-mp-playwright/node_modules
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright
        run: scripts/run-h5-e2e.sh

      - name: Upload Playwright diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: h5-playwright-diagnostics
          path: e2e/output/playwright/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop E2E MinIO service
        if: always()
        run: docker stop baby-mp-e2e-minio >/dev/null 2>&1 || true

  runtime-image:
    # Production image and runtime-compose checks are release concerns and are
    # intentionally manual during the local-development phase.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUNTIME_IMAGE: baby-mp:ci
      APP_ENV: staging
      APP_VERSION: ci-runtime-audit
      BABY_MP_IMAGE_REF: baby-mp@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      API_HOST: 0.0.0.0
      API_PORT: '3000'
      TRUST_PROXY: 'false'
      JSON_BODY_LIMIT_BYTES: '262144'
      SWAGGER_ENABLED: 'false'
      INTERNAL_MONITORING_TOKEN: ci-runtime-monitoring-token-1234567890
      BUSINESS_TIME_ZONE: Asia/Shanghai
      CORS_ORIGINS: https://app.ci.example
      DATABASE_URL: postgresql://ci:ci@db.ci.example:5432/baby
      JWT_ACCESS_SECRET: ci-runtime-access-secret
      JWT_REFRESH_SECRET: ci-runtime-refresh-secret
      MOCK_AUTH_ENABLED: 'false'
      WECHAT_APP_ID: wx433aecb90d44e9fe
      WECHAT_APP_SECRET: ci-runtime-wechat-secret
      WECHAT_CODE2SESSION_URL: https://api.weixin.qq.com/sns/jscode2session
      S3_ENDPOINT: https://s3.ci.example
      S3_REGION: ci-region
      S3_BUCKET: baby-mp-ci-runtime
      S3_ACCESS_KEY: ci-runtime-access-key
      S3_SECRET_KEY: ci-runtime-storage-secret
      S3_FORCE_PATH_STYLE: 'false'
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Build production runtime image
        run: docker build --tag "$RUNTIME_IMAGE" .

      - name: Verify runtime image contents and preflight
        run: |
          test "$(docker image inspect "$RUNTIME_IMAGE" --format '{{.Config.User}}')" = node
          scripts/verify-runtime-image.sh

      - name: Verify runtime compose renders all required services
        env:
          BABY_MP_IMAGE: baby-mp@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        run: |
          deploy/runtime-compose.sh --preflight-only
          deploy/runtime-compose.sh --profile migration config --format json \
            | node scripts/verify-runtime-compose.mjs
          if BABY_MP_IMAGE=baby-mp:latest deploy/runtime-compose.sh --preflight-only >/dev/null 2>&1; then
            echo 'Runtime compose accepted a mutable image reference' >&2
            exit 1
          fi
