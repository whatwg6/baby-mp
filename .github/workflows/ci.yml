name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        env:
          APP_ENV: test
          APP_VERSION: 0.1.0
          API_HOST: 127.0.0.1
          API_PORT: 3000
          CORS_ORIGINS: http://localhost:10086
          DATABASE_URL: postgresql://baby_mp:baby_mp@localhost:5432/baby_mp_test?schema=public
          JWT_ACCESS_SECRET: ci-only-access-secret-not-for-production
          JWT_REFRESH_SECRET: ci-only-refresh-secret-not-for-production
          MOCK_AUTH_ENABLED: 'false'
          S3_ENDPOINT: http://localhost:9000
          S3_REGION: local
          S3_BUCKET: baby-mp-test
          S3_ACCESS_KEY: ci-only-key
          S3_SECRET_KEY: ci-only-secret
          S3_FORCE_PATH_STYLE: 'true'
          TARO_APP_API_BASE_URL: http://localhost:3000
        run: pnpm verify
