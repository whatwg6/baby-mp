name: baby-mp

services:
  postgres:
    image: postgres:16.9-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-baby_mp}
      POSTGRES_USER: ${POSTGRES_USER:-baby_mp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baby-mp-local-password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}',
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-baby-mp-local}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-baby-mp-local-password}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: 'no'
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-baby-mp-local}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-baby-mp-local-password}
      S3_BUCKET: ${S3_BUCKET:-baby-mp-local}
    entrypoint: >-
      /bin/sh -c '
      mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
      mc mb --ignore-existing "local/$${S3_BUCKET}" &&
      mc anonymous set none "local/$${S3_BUCKET}"
      '

volumes:
  postgres-data:
  minio-data:
