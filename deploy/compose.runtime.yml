name: baby-mp-runtime

x-runtime-environment: &runtime-environment
  APP_ENV: ${APP_ENV:?set APP_ENV to staging or production}
  APP_VERSION: ${APP_VERSION:?set immutable APP_VERSION}
  API_HOST: 0.0.0.0
  API_PORT: 3000
  TRUST_PROXY: ${TRUST_PROXY:-false}
  JSON_BODY_LIMIT_BYTES: ${JSON_BODY_LIMIT_BYTES:-262144}
  SWAGGER_ENABLED: "false"
  INTERNAL_MONITORING_TOKEN: ${INTERNAL_MONITORING_TOKEN:?inject from secret store}
  BUSINESS_TIME_ZONE: ${BUSINESS_TIME_ZONE:-Asia/Shanghai}
  CORS_ORIGINS: ${CORS_ORIGINS:?set exact HTTPS origins}
  DATABASE_URL: ${DATABASE_URL:?inject from secret store}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?inject from secret store}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?inject from secret store}
  MOCK_AUTH_ENABLED: "false"
  WECHAT_APP_ID: wx433aecb90d44e9fe
  WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:?inject from secret store}
  WECHAT_CODE2SESSION_URL: https://api.weixin.qq.com/sns/jscode2session
  S3_ENDPOINT: ${S3_ENDPOINT:?set private HTTPS S3 endpoint}
  S3_REGION: ${S3_REGION:?set S3 region}
  S3_BUCKET: ${S3_BUCKET:?set private bucket}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:?inject from secret store}
  S3_SECRET_KEY: ${S3_SECRET_KEY:?inject from secret store}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
  RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
  RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-10}
  RATE_LIMIT_INVITE_MAX: ${RATE_LIMIT_INVITE_MAX:-30}
  RATE_LIMIT_UPLOAD_MAX: ${RATE_LIMIT_UPLOAD_MAX:-60}

services:
  migrate:
    image: ${BABY_MP_IMAGE:?set immutable image digest}
    restart: "no"
    environment: *runtime-environment
    command: ["pnpm", "--filter", "@baby-mp/api", "prisma:deploy"]
    profiles: ["migration"]

  api:
    image: ${BABY_MP_IMAGE:?set immutable image digest}
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment: *runtime-environment
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PUBLIC_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  export-worker:
    image: ${BABY_MP_IMAGE:?set immutable image digest}
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment: *runtime-environment
    command: ["node", "apps/api/dist/exports/run-export-worker.js"]
    stop_grace_period: 45s
